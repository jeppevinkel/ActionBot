name: CLA Validation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  validate-cla:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check if author is in CLA
        id: validate-cla
        shell: pwsh
        env:
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          $selector = Select-String -Path CLA.md -Pattern "- $Env:AUTHOR_LOGIN"

          if ($selector -ne $null)
          {
            "in_cla=true" >> $Env:GITHUB_OUTPUT
            "$Env:AUTHOR_LOGIN is in the CLA" >> $Env:GITHUB_STEP_SUMMARY
          }
          else
          {
            "in_cla=false" >> $Env:GITHUB_OUTPUT
            "$Env:AUTHOR_LOGIN is not in the CLA" >> $Env:GITHUB_STEP_SUMMARY
          }
    
      - name: Post message about CLA
        if: steps.validate-cla.outputs.in_cla == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Pull requests will only be accepted if the [CLA](CLA.md) has been signed.\n\nIt appears that you have not yet signed the [CLA](CLA.md) with your GitHub username. Please make sure to sign it before your pull request can be merged.'
            })